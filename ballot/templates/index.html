<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Голосование — Кинопремия</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-indigo-50 min-h-screen flex items-center justify-center">
  <div class="bg-white shadow-lg rounded-2xl p-10 w-full max-w-md">
    <h1 class="text-2xl font-bold text-indigo-700 mb-2">🎬 Кинопремия</h1>
    <p class="text-gray-500 mb-6">Введите ваш ник, чтобы перейти к бюллетеню.</p>

    {% if error %}
    <div class="bg-red-100 text-red-700 rounded-lg px-4 py-3 mb-4 text-sm">{{ error }}</div>
    {% endif %}

    <form method="post" action="/">
      {% if next %}
      <input type="hidden" name="next" value="{{ next }}" />
      {% endif %}
      <label class="block text-sm font-medium text-gray-700 mb-1">Ваш ник</label>
      <input
        type="text" name="name" required autofocus
        placeholder="например, Ruslan42"
        class="w-full border border-gray-300 rounded-lg px-4 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400 mb-4"
      />
      <button
        type="submit"
        class="w-full bg-indigo-600 text-white py-2 rounded-lg font-semibold hover:bg-indigo-700 transition"
      >Войти →</button>
    </form>
  </div>
</body>
</html>
