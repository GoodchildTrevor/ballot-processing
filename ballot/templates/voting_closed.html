{% extends "base.html" %}
{% block title %}Голосование закрыто{% endblock %}
{% block content %}
<div class="max-w-lg mx-auto mt-24 text-center px-4">
  <div class="text-5xl mb-6">⏰</div>
  <h1 class="text-2xl font-bold text-gray-800 mb-3">Голосование закрыто</h1>
  <p class="text-gray-500 mb-2">Дедлайн для <strong>{{ nom.name }}</strong> истёк.</p>
  {% if nom.vote_deadline %}
  <p class="text-gray-400 text-sm mb-8">
    Дедлайн был: <span class="font-mono">{{ nom.vote_deadline.strftime('%d.%m.%Y %H:%M') }}</span>
  </p>
  {% endif %}
  <a href="/" class="inline-block bg-indigo-600 text-white px-6 py-2 rounded-lg text-sm hover:bg-indigo-700 transition">
    На главную
  </a>
</div>
{% endblock %}
