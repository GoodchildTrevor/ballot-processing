{% extends "base.html" %}
{% block title %}Голосование закрыто{% endblock %}
{% block content %}
<div class="max-w-lg mx-auto mt-24 text-center px-4">
  <div class="text-6xl mb-6">🔒</div>
  <h1 class="text-2xl font-extrabold text-gray-900 mb-3">Голосование недоступно</h1>
  <p class="text-gray-500 mb-2">{{ message }}</p>
  {% if round and round.deadline %}
    <p class="text-sm text-gray-400">Дедлайн: {{ round.deadline.strftime('%d.%m.%Y %H:%M') }}</p>
  {% endif %}
  <div class="mt-8">
    <a href="/" class="text-indigo-500 text-sm hover:underline">← На главную</a>
  </div>
</div>
{% endblock %}
