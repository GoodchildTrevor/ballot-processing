<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}Кинопремия{% endblock %}</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
</head>
<body class="bg-gray-50 text-gray-800 min-h-screen">

{% block nav %}
<nav class="bg-indigo-700 text-white px-6 py-3 flex flex-wrap gap-4 items-center text-sm font-medium">
  <span class="font-bold text-base mr-4">🎬 Кинопремия</span>
  <a href="/admin/films" class="hover:underline">Фильмы</a>
  <a href="/admin/nominations" class="hover:underline">Номинации</a>
  <a href="/admin/voters" class="hover:underline">Участники</a>
  <a href="/admin/results" class="hover:underline">Результаты</a>
  <a href="/admin/results/export" class="ml-auto bg-white text-indigo-700 px-3 py-1 rounded hover:bg-indigo-50">📥 Экспорт .xlsx</a>
</nav>
{% endblock %}

<main class="max-w-5xl mx-auto px-4 py-8">
  {% block content %}{% endblock %}
</main>
</body>
</html>
