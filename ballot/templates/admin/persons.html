{% extends "base.html" %}
{% block title %}Персоны — Админка{% endblock %}
{% block content %}
<h1 class="text-2xl font-bold mb-6">Персоны</h1>

<div class="bg-white shadow rounded-xl p-6 mb-8">
  <h2 class="text-base font-semibold mb-4 text-gray-700">Добавить персону</h2>
  <form method="post" action="/admin/persons" class="flex flex-wrap gap-3 items-end">
    <div>
      <label class="block text-xs text-gray-500 mb-1">Имя</label>
      <input type="text" name="name" required placeholder="напр. Кристофер Нолан"
             class="border border-gray-300 rounded-lg px-3 py-2 text-sm w-72 focus:ring-indigo-400 focus:outline-none" />
    </div>
    <div>
      <label class="block text-xs text-gray-500 mb-1">Ссылка <span class="text-gray-300">(необяз.)</span></label>
      <input type="url" name="url" placeholder="https://..."
             class="border border-gray-300 rounded-lg px-3 py-2 text-sm w-64 focus:ring-indigo-400 focus:outline-none" />
    </div>
    <button type="submit" class="bg-indigo-600 text-white px-4 py-2 rounded-lg text-sm hover:bg-indigo-700">Добавить</button>
  </form>
</div>

<script>
const PERSONS_DATA = [
  {% for person in persons %}
  {
    id: {{ person.id }},
    name: {{ person.name | tojson }},
    url: {{ person.url | tojson if person.url else 'null' }},
    longlist_count: {{ person.nominees | length }},
    longlists: [
      {% for n in person.nominees %}
      {
        nom_id: {{ n.nomination.id }},
        nom: {{ n.nomination.name | tojson }},
        film: {{ n.film.title | tojson }},
        film_id: {{ n.film.id }},
        film_url: {{ n.film.url | tojson if n.film.url else 'null' }},
        year: {{ n.film.year }}
      }{% if not loop.last %},{% endif %}
      {% endfor %}
    ]
  }{% if not loop.last %},{% endif %}
  {% endfor %}
];
</script>

<div x-data="personsTable()" class="bg-white shadow rounded-xl p-6">

  <div class="flex flex-wrap gap-3 items-center mb-4">
    <input x-model="search" type="text" placeholder="Поиск по имени..."
           class="border border-gray-300 rounded-lg px-3 py-2 text-sm w-72 focus:ring-indigo-400 focus:outline-none" />
    <span class="text-xs text-gray-400" x-text="filtered().length + ' персон'"></span>
  </div>

  <table class="w-full text-sm">
    <thead class="text-left text-gray-500 border-b select-none">
      <tr>
        <th class="pb-2 pr-4 cursor-pointer hover:text-indigo-600" @click="sortBy('name')">
          Имя <span x-text="sortIcon('name')" class="text-xs"></span>
        </th>
        <th class="pb-2 pr-4 cursor-pointer hover:text-indigo-600" @click="sortBy('longlist_count')">
          Лонг-листов <span x-text="sortIcon('longlist_count')" class="text-xs"></span>
        </th>
        <th class="pb-2 pr-4">В лонг-листах</th>
        <th class="pb-2"></th>
      </tr>
    </thead>
    <tbody>
      <template x-for="p in filtered()" :key="p.id">
        <tr class="border-b last:border-0 hover:bg-gray-50 align-top" x-data="{ editing: false }">

          {# Person name — external link if url exists, plain span otherwise #}
          <td class="py-2 pr-4">
            <span x-show="!editing">
              <span x-html="p.url
                ? '<a href=&quot;' + p.url + '&quot; target=&quot;_blank&quot; rel=&quot;noopener noreferrer&quot; class=&quot;font-medium text-indigo-600 hover:underline&quot;>' + escHtml(p.name) + '</a>'
                : '<span class=&quot;font-medium text-gray-800&quot;>' + escHtml(p.name) + '</span>'
              "></span>
            </span>
            <form x-show="editing" :action="'/admin/persons/' + p.id + '/edit'"
                  method="post" class="flex flex-wrap gap-2 items-center">
              <input type="text" name="name" :value="p.name"
                     class="border border-gray-300 rounded px-2 py-1 text-sm w-48 focus:ring-indigo-400 focus:outline-none" required />
              <input type="url" name="url" :value="p.url || ''"
                     placeholder="https://..."
                     class="border border-gray-300 rounded px-2 py-1 text-sm w-52 focus:ring-indigo-400 focus:outline-none" />
              <button type="submit" class="text-xs text-indigo-600 hover:underline">Сохранить</button>
              <button type="button" @click="editing = false" class="text-xs text-gray-400 hover:underline">Отмена</button>
            </form>
          </td>

          <td class="py-2 pr-4 tabular-nums font-semibold text-gray-600" x-text="p.longlist_count || '—'"></td>

          {# Longlist entries: film link (external if url) + nomination link (internal admin page) #}
          <td class="py-2 pr-4">
            <span x-show="p.longlists.length === 0" class="text-gray-300 text-xs">—</span>
            <template x-for="ll in p.longlists" :key="ll.nom_id + '-' + ll.film_id">
              <div class="text-xs mb-0.5 flex flex-wrap items-baseline gap-x-1"
                   x-html="filmEntry(ll)"></div>
            </template>
          </td>

          <td class="py-2 text-right whitespace-nowrap">
            <button type="button" @click="editing = !editing"
                    class="text-xs text-indigo-500 hover:underline mr-2"
                    x-text="editing ? '✕' : 'Редактировать'"></button>
            <form method="post" :action="'/admin/persons/' + p.id + '/delete'" class="inline"
                  @submit.prevent="confirm('Удалить ' + p.name + '?') && $el.submit()">
              <button class="text-xs text-red-500 hover:underline">Удалить</button>
            </form>
          </td>
        </tr>
      </template>
    </tbody>
  </table>

  <p x-show="filtered().length === 0" class="text-center text-gray-400 py-8 text-sm">Ничего не найдено.</p>
</div>

<script>
function escHtml(str) {
  return String(str)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

function filmEntry(ll) {
  const filmPart = ll.film_url
    ? '<a href="' + ll.film_url + '" target="_blank" rel="noopener noreferrer" class="font-medium text-gray-700 hover:text-indigo-600 hover:underline">' + escHtml(ll.film) + '</a>'
    : '<span class="font-medium text-gray-700">' + escHtml(ll.film) + '</span>';
  const yearPart = '<span class="text-gray-400">(' + ll.year + ')</span>';
  const nomPart  = '<a href="/admin/nominations/' + ll.nom_id + '" class="text-indigo-400 hover:text-indigo-600 hover:underline">' + escHtml(ll.nom) + '</a>';
  return filmPart + ' ' + yearPart + ' — ' + nomPart;
}

function personsTable() {
  return {
    search: '',
    col: 'name',
    dir: 'asc',
    sortBy(c) {
      if (this.col === c) this.dir = this.dir === 'asc' ? 'desc' : 'asc';
      else { this.col = c; this.dir = c === 'longlist_count' ? 'desc' : 'asc'; }
    },
    sortIcon(c) {
      if (this.col !== c) return '⇕';
      return this.dir === 'asc' ? '▲' : '▼';
    },
    filtered() {
      const q = this.search.toLowerCase();
      let rows = PERSONS_DATA.filter(p => !q || p.name.toLowerCase().includes(q));
      const c = this.col, d = this.dir;
      rows.sort((a, b) => {
        let av = a[c], bv = b[c];
        if (typeof av === 'string') av = av.toLowerCase(), bv = bv.toLowerCase();
        if (av < bv) return d === 'asc' ? -1 : 1;
        if (av > bv) return d === 'asc' ? 1 : -1;
        return 0;
      });
      return rows;
    }
  }
}
</script>
{% endblock %}
